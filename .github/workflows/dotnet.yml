name: Build and test

on:
  push:
    branches: [main, master]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "**.slnf"
      - "**.props"
      - "**.json"
      - "**.axaml"
      - "**.glsl"
      - "docs/generated/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, master]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "**.slnf"
      - "**.props"
      - "**.json"
      - "**.axaml"
      - "**.glsl"
      - "docs/generated/**"
      - ".github/workflows/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/AutoPBR.App/**'
              - 'tests/AutoPBR.App.Tests/**'
              - 'src/AutoPBR.PreviewGpuAssets/**'
              - 'src/AutoPBR.Tools.GeneratePreviewCloudAssets/**'
              - 'src/AutoPBR.Tools.GeneratePreviewGroundAssets/**'
              - 'src/AutoPBR.Tools.GenerateIcon/**'

  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore "AutoPBR.Core.slnf"

      - name: Build core stack (no Avalonia App)
        run: dotnet build "AutoPBR.Core.slnf" -c Release --no-restore -m -v minimal

      - name: Test core stack
        run: |
          dotnet test "tests/AutoPBR.Preview.Tests/AutoPBR.Preview.Tests.csproj" -c Release --no-build --settings tests/ci.runsettings -v minimal
          dotnet test "tests/AutoPBR.Core.Tests/AutoPBR.Core.Tests.csproj" -c Release --no-build --settings tests/ci.runsettings -v minimal
          dotnet test "tests/AutoPBR.GeometryCompiler.Tests/AutoPBR.GeometryCompiler.Tests.csproj" -c Release --no-build --settings tests/ci.runsettings -v minimal
          dotnet test "tests/AutoPBR.AnimationCompiler.Tests/AutoPBR.AnimationCompiler.Tests.csproj" -c Release --no-build --settings tests/ci.runsettings -v minimal

      - name: Validate geometry IR (26.1.2 strict)
        run: dotnet run --project src/AutoPBR.Tools.GeometryCompiler --no-build -c Release -- validate-geometry --strict 26.1.2

      - name: Geometry IR reference alignment (strict pilots, when reference JSON committed)
        run: dotnet test tests/AutoPBR.Preview.Tests/AutoPBR.Preview.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~GeometryIrReferenceBakeTests" -v minimal

  build-app:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore "AutoPBR.App.slnf"

      - name: Build App stack
        run: dotnet build "AutoPBR.App.slnf" -c Release --no-restore -m -v minimal

      - name: Test App
        run: dotnet test "tests/AutoPBR.App.Tests/AutoPBR.App.Tests.csproj" -c Release --no-build --settings tests/ci.runsettings -v minimal
