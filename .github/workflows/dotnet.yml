name: Build and test

on:
  push:
    branches: [main, master]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "**.props"
      - "**.json"
      - "**.axaml"
      - "**.glsl"
      - "docs/generated/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, master]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "**.props"
      - "**.json"
      - "**.axaml"
      - "**.glsl"
      - "docs/generated/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore "AutoPBR.sln"

      - name: Build
        run: dotnet build "AutoPBR.sln" -c Release --no-restore -v minimal

      - name: Test
        run: dotnet test "AutoPBR.sln" -c Release --no-build --settings tests/ci.runsettings -v minimal

      - name: Validate geometry IR (26.1.2 strict)
        run: dotnet run --project src/AutoPBR.Tools.GeometryCompiler --no-build -c Release -- validate-geometry --strict 26.1.2

      - name: Geometry IR reference alignment (strict pilots, when reference JSON committed)
        run: dotnet test tests/AutoPBR.Core.Tests/AutoPBR.Core.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~GeometryIrReferenceBakeTests" -v minimal
